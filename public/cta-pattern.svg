<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .dot { fill: #371919; opacity: 0.8; }
      .dot-small { fill: #371919; opacity: 0.5; }
      .line { stroke: #371919; stroke-width: 1; opacity: 0.6; }
      .circle { fill: none; stroke: #371919; stroke-width: 1; opacity: 0.6; }
      .wave { fill: none; stroke: #371919; stroke-width: 1.5; opacity: 0.7; }
    </style>
  </defs>
  
  <rect width="600" height="400" fill="transparent"/>
  
  <!-- Линии связи/коммуникации -->
  <path class="wave" d="M 450 50 Q 480 80 450 110 Q 420 140 450 170" />
  <path class="wave" d="M 500 30 Q 530 60 500 90 Q 470 120 500 150" />
  <path class="wave" d="M 520 200 Q 550 230 520 260 Q 490 290 520 320" />
  
  <!-- Точки -->
  <circle class="dot" cx="420" cy="40" r="3"/>
  <circle class="dot" cx="480" cy="80" r="2"/>
  <circle class="dot" cx="440" cy="130" r="2.5"/>
  <circle class="dot" cx="510" cy="50" r="2"/>
  <circle class="dot" cx="550" cy="100" r="1.5"/>
  <circle class="dot" cx="530" cy="160" r="3"/>
  <circle class="dot" cx="460" cy="190" r="2"/>
  <circle class="dot" cx="500" cy="240" r="2.5"/>
  <circle class="dot" cx="560" cy="220" r="2"/>
  <circle class="dot" cx="540" cy="280" r="1.5"/>
  <circle class="dot" cx="580" cy="310" r="2"/>
  <circle class="dot" cx="490" cy="340" r="3"/>
  
  <!-- Маленькие точки -->
  <circle class="dot-small" cx="430" cy="60" r="1"/>
  <circle class="dot-small" cx="500" cy="110" r="1"/>
  <circle class="dot-small" cx="470" cy="150" r="1.5"/>
  <circle class="dot-small" cx="550" cy="180" r="1"/>
  <circle class="dot-small" cx="520" cy="250" r="1"/>
  <circle class="dot-small" cx="570" cy="270" r="1.5"/>
  <circle class="dot-small" cx="480" cy="300" r="1"/>
  
  <!-- Сетка/структура -->
  <path class="line" d="M 400 50 L 450 50" />
  <path class="line" d="M 400 80 L 460 80" />
  <path class="line" d="M 400 120 L 430 120" />
  <path class="line" d="M 400 160 L 470 160" />
  <path class="line" d="M 400 200 L 450 200" />
  <path class="line" d="M 400 240 L 440 240" />
  <path class="line" d="M 400 280 L 480 280" />
  <path class="line" d="M 400 320 L 450 320" />
  <path class="line" d="M 400 360 L 460 360" />
  
  <!-- Круги для акцента -->
  <circle class="circle" cx="500" cy="60" r="15"/>
  <circle class="circle" cx="550" cy="140" r="20"/>
  <circle class="circle" cx="480" cy="270" r="12"/>
  <circle class="circle" cx="560" cy="330" r="18"/>
  
  <!-- Символ сообщения/чата -->
  <g transform="translate(520, 360)" opacity="0.1">
    <rect x="0" y="0" width="30" height="22" rx="4" fill="#371919"/>
    <path d="M 5 22 L 12 16 L 25 16" stroke="#371919" fill="none" stroke-width="2"/>
    <line x1="8" y1="8" x2="22" y2="8" stroke="#371919" stroke-width="1.5"/>
    <line x1="8" y1="13" x2="18" y2="13" stroke="#371919" stroke-width="1.5"/>
  </g>
  
  <!-- Символ ракеты/скорости -->
  <g transform="translate(460, 310)" opacity="0.8">
    <path d="M 10 20 L 15 5 L 20 20 Z" fill="#371919"/>
    <rect x="12" y="20" width="6" height="8" rx="1" fill="#371919"/>
    <path d="M 8 22 L 12 22 L 10 28 Z" fill="#371919"/>
    <path d="M 18 22 L 22 22 L 20 28 Z" fill="#371919"/>
  </g>
</svg>